<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Myntra – Online Shopping</title>

    <link rel="stylesheet" href="myntra.css">
    <link rel="stylesheet" href="mynutils.css">
</head>

<body>

<header class="containerHeader">
    <nav class="navbar">
        <!-- LEFT -->
        <div class="left">
            <img src="mynl.png" alt="Myntra Logo" class="logo">
            <ul class="menu">
                <li>Men</li>
                <li>Women</li>
                <li>Kids</li>
                <li>Home & Living</li>
                <li>Beauty</li>
                <li>Studio</li>
            </ul>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <input 
                type="text" 
                class="search" 
                placeholder="Search for products, brands and more">

            <div class="rightBox">
                <div class="profile">Profile</div>
                <div class="wishlist">Wishlist</div>
                <div class="bag">Bag</div>
            </div>
        </div>
    </nav>
</header>

<!-- BANNERS -->
<section class="container section1">
    <img class="homeImg" src="home.png" alt="Banner">
    <img class="homeImg" src="https://assets.myntassets.com/f_webp,w_980,c_limit/assets/images/2022/5/13/e34b394c.gif" alt="Offer">
    <img class="homeImg" src="https://assets.myntassets.com/f_webp,w_980,c_limit/assets/images/2022/5/7/1e599d37.jpg" alt="Deals">

    <img class="homeImg" src="https://assets.myntassets.com/f_webp,w_980,c_limit/assets/images/2023/7/18/hero2.jpg">
    <img class="homeImg" src="https://assets.myntassets.com/f_webp,w_980,c_limit/assets/images/2023/7/18/hero3.jpg">

</section>

<!-- BRAND STRIP -->
